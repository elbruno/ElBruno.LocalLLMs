name: Squad Preview Validation

on:
  push:
    branches: [preview]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore ElBruno.LocalLLMs.slnx

      - name: Build
        run: dotnet build ElBruno.LocalLLMs.slnx --configuration Release --no-restore

      - name: Unit Tests
        run: dotnet test tests/ElBruno.LocalLLMs.Tests/ElBruno.LocalLLMs.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Validate version in .csproj
        run: |
          VERSION=$(grep -oP '(?<=<Version>).*(?=</Version>)' src/ElBruno.LocalLLMs/ElBruno.LocalLLMs.csproj)
          if [ -z "$VERSION" ]; then
            echo "::error::❌ No <Version> field found in .csproj."
            exit 1
          fi
          echo "✅ .csproj version: $VERSION"

      - name: Validate version consistency
        run: |
          VERSION=$(grep -oP '(?<=<Version>).*(?=</Version>)' src/ElBruno.LocalLLMs/ElBruno.LocalLLMs.csproj)
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md 2>/dev/null; then
            echo "::error::Version $VERSION not found in CHANGELOG.md — update CHANGELOG.md before release"
            exit 1
          fi
          echo "✅ Version $VERSION validated in CHANGELOG.md"

      - name: Check no .ai-team/ or .squad/ files are tracked
        run: |
          FOUND_FORBIDDEN=0
          if git ls-files --error-unmatch .ai-team/ 2>/dev/null; then
            echo "::error::❌ .ai-team/ files are tracked on preview — this must not ship."
            FOUND_FORBIDDEN=1
          fi
          if git ls-files --error-unmatch .squad/ 2>/dev/null; then
            echo "::error::❌ .squad/ files are tracked on preview — this must not ship."
            FOUND_FORBIDDEN=1
          fi
          if [ $FOUND_FORBIDDEN -eq 1 ]; then
            exit 1
          fi
          echo "✅ No .ai-team/ or .squad/ files tracked — clean for release."
