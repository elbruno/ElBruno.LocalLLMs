name: Squad CI

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, insider]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ElBruno.LocalLLMs.slnx -p:TargetFrameworks=net8.0

      - name: Build
        run: dotnet build ElBruno.LocalLLMs.slnx --configuration Release --no-restore -p:TargetFrameworks=net8.0

      - name: Unit Tests
        run: dotnet test ElBruno.LocalLLMs.slnx --configuration Release --no-build --framework net8.0 --verbosity normal
