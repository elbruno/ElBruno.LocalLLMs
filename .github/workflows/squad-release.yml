name: Squad Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ElBruno.LocalLLMs.slnx -p:TargetFrameworks=net8.0

      - name: Build
        run: dotnet build ElBruno.LocalLLMs.slnx --configuration Release --no-restore -p:TargetFrameworks=net8.0

      - name: Unit Tests
        run: dotnet test ElBruno.LocalLLMs.slnx --configuration Release --no-build --framework net8.0 --verbosity normal

      - name: Read version from .csproj
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<Version>).*(?=</Version>)' src/ElBruno.LocalLLMs/ElBruno.LocalLLMs.csproj)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION (tag: v$VERSION)"

      - name: Validate version consistency
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if ! grep -q "## \[$VERSION\]" docs/CHANGELOG.md 2>/dev/null; then
            echo "::error::Version $VERSION not found in docs/CHANGELOG.md — update docs/CHANGELOG.md before release"
            exit 1
          fi
          echo "✅ Version $VERSION validated in docs/CHANGELOG.md"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Tag ${{ steps.version.outputs.tag }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "🆕 Tag ${{ steps.version.outputs.tag }} does not exist — creating release."
          fi

      - name: Create git tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --latest

      - name: Verify release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.version.outputs.tag }}"
          echo "✅ Release ${{ steps.version.outputs.tag }} created and verified."

      - name: Trigger publish workflow
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish.yml -f version=${{ steps.version.outputs.version }}
          echo "🚀 Triggered publish workflow for version ${{ steps.version.outputs.version }}"
