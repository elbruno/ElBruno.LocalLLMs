name: Publish to NuGet

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore ElBruno.LocalLLMs.slnx

      - name: Build
        run: dotnet build ElBruno.LocalLLMs.slnx --configuration Release --no-restore

      - name: Unit Tests
        run: dotnet test tests/ElBruno.LocalLLMs.Tests/ElBruno.LocalLLMs.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/ElBruno.LocalLLMs/ElBruno.LocalLLMs.csproj --configuration Release --no-build -p:PackageVersion=${{ steps.version.outputs.VERSION }} --output ./nupkg

      - name: Check NuGet API Key
        id: check_key
        run: |
          if [ -z "${{ secrets.NUGET_API_KEY }}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ NUGET_API_KEY secret is not set — skipping NuGet push"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
            echo "✅ NUGET_API_KEY is configured"
          fi

      - name: Push to NuGet
        if: steps.check_key.outputs.has_key == 'true'
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./nupkg/*.nupkg
